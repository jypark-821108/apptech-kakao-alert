name: Yongin Mohyeon Newsletter

on:
  schedule:
    # Korea time 18:37 and 18:52. GitHub scheduled workflows can be skipped, so we provide repeated chances.
    - cron: '37,52 9 * * *'
    # Korea time 19:07 through 21:52 every 15 minutes. Duplicate guard sends at most once after 18:00 KST.
    - cron: '7,22,37,52 10-12 * * *'
    # Korea time 22:07 and 22:22 final backups.
    - cron: '7,22 13 * * *'
  workflow_dispatch:
    inputs:
      target_date:
        description: 'Optional backfill date, e.g. 2026-05-04'
        required: false
        default: ''
        type: string

permissions:
  contents: write

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check duplicate newsletter
        id: newsletter_guard
        shell: bash
        run: |
          today=$(TZ=Asia/Seoul date +%F)
          hour=$(TZ=Asia/Seoul date +%H)
          target_date="${{ inputs.target_date }}"
          echo "today=$today" >> "$GITHUB_OUTPUT"

          if [ -z "$target_date" ] && [ "$hour" -lt 18 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "It is before 18:00 KST. Skipping local newsletter so news can accumulate."
            exit 0
          fi

          if [ "${{ github.event_name }}" != "workflow_dispatch" ] && [ -f local-news-status.json ] && grep -q "\"date\": \"$today\"" local-news-status.json; then
            status=$(python - <<PY
          import json, pathlib, re
          status_path = pathlib.Path('local-news-status.json')
          data_path = pathlib.Path('docs/news-data') / '$today.json'
          try:
              status = json.loads(status_path.read_text(encoding='utf-8'))
          except Exception:
              status = {}
          try:
              data = json.loads(data_path.read_text(encoding='utf-8'))
              article_count = len(data.get('articles') or [])
          except Exception:
              article_count = 0
          sent_at = str(status.get('sent_at') or '')
          m = re.search(r'\b(\d{2}):(\d{2}):(\d{2})\b', sent_at)
          sent_hour = int(m.group(1)) if m else -1
          print(f'{article_count},{sent_hour}')
          PY
            )
            article_count=${status%,*}
            sent_hour=${status#*,}
            if [ "$article_count" -gt 0 ] && [ "$sent_hour" -ge 18 ]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "Today's newsletter was already sent after 18:00 KST with $article_count articles. Skipping backup run."
            else
              echo "skip=false" >> "$GITHUB_OUTPUT"
              echo "Previous newsletter was empty or sent before 18:00 KST. Running again."
            fi
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-python@v5
        if: steps.newsletter_guard.outputs.skip != 'true'
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
        if: steps.newsletter_guard.outputs.skip != 'true'
      - name: Build and send local newsletter
        if: steps.newsletter_guard.outputs.skip != 'true'
        env:
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
          NEWSLETTER_URL: https://jypark-821108.github.io/apptech-kakao-alert/newsletter.html
          TARGET_DATE: ${{ inputs.target_date }}
        run: python local_newsletter.py
      - name: Mark newsletter sent
        if: steps.newsletter_guard.outputs.skip != 'true'
        shell: bash
        run: |
          sent_date="${{ inputs.target_date }}"
          if [ -z "$sent_date" ]; then
            sent_date="${{ steps.newsletter_guard.outputs.today }}"
          fi
          article_count=$(python - <<PY
          import json, pathlib
          path = pathlib.Path('docs/news-data') / '$sent_date.json'
          try:
              data = json.loads(path.read_text(encoding='utf-8'))
              print(len(data.get('articles') or []))
          except Exception:
              print(0)
          PY
          )
          cat > local-news-status.json <<EOF
          {
            "date": "$sent_date",
            "sent_at": "$(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M:%S %Z')",
            "article_count": $article_count
          }
          EOF
      - name: Commit newsletter page
        if: steps.newsletter_guard.outputs.skip != 'true' && always()
        run: |
          if [ -f docs/newsletter.html ] || [ -f local-news-status.json ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/newsletter.html docs/news docs/news-data local-news-status.json
            git diff --cached --quiet || git commit -m "Update local newsletter page"
            git push
          fi
