name: Yongin Mohyeon Newsletter

on:
  schedule:
    # Korea time 19:17 primary run. Extra runs are backups because GitHub scheduled workflows can be skipped.
    - cron: '17 10 * * *'
    # Korea time 19:47 backup run. Skips automatically if today's newsletter was already sent with articles.
    - cron: '47 10 * * *'
    # Korea time 20:17 final backup run. Skips automatically if today's newsletter was already sent with articles.
    - cron: '17 11 * * *'
  workflow_dispatch:
    inputs:
      target_date:
        description: 'Optional backfill date, e.g. 2026-05-04'
        required: false
        default: ''
        type: string

permissions:
  contents: write

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check duplicate newsletter
        id: newsletter_guard
        shell: bash
        run: |
          today=$(TZ=Asia/Seoul date +%F)
          echo "today=$today" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" != "workflow_dispatch" ] && [ -f local-news-status.json ] && grep -q "\"date\": \"$today\"" local-news-status.json; then
            article_count=$(python - <<PY
          import json, pathlib
          path = pathlib.Path('docs/news-data') / '$today.json'
          try:
              data = json.loads(path.read_text(encoding='utf-8'))
              print(len(data.get('articles') or []))
          except Exception:
              print(0)
          PY
            )
            if [ "$article_count" -gt 0 ]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "Today's newsletter was already sent with $article_count articles. Skipping backup run."
            else
              echo "skip=false" >> "$GITHUB_OUTPUT"
              echo "Today's previous newsletter had no articles. Running again."
            fi
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-python@v5
        if: steps.newsletter_guard.outputs.skip != 'true'
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
        if: steps.newsletter_guard.outputs.skip != 'true'
      - name: Build and send local newsletter
        if: steps.newsletter_guard.outputs.skip != 'true'
        env:
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
          NEWSLETTER_URL: https://jypark-821108.github.io/apptech-kakao-alert/newsletter.html
          TARGET_DATE: ${{ inputs.target_date }}
        run: python local_newsletter.py
      - name: Mark newsletter sent
        if: steps.newsletter_guard.outputs.skip != 'true'
        shell: bash
        run: |
          sent_date="${{ inputs.target_date }}"
          if [ -z "$sent_date" ]; then
            sent_date="${{ steps.newsletter_guard.outputs.today }}"
          fi
          article_count=$(python - <<PY
          import json, pathlib
          path = pathlib.Path('docs/news-data') / '$sent_date.json'
          try:
              data = json.loads(path.read_text(encoding='utf-8'))
              print(len(data.get('articles') or []))
          except Exception:
              print(0)
          PY
          )
          cat > local-news-status.json <<EOF
          {
            "date": "$sent_date",
            "sent_at": "$(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M:%S %Z')",
            "article_count": $article_count
          }
          EOF
      - name: Commit newsletter page
        if: steps.newsletter_guard.outputs.skip != 'true' && always()
        run: |
          if [ -f docs/newsletter.html ] || [ -f local-news-status.json ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/newsletter.html docs/news docs/news-data local-news-status.json
            git diff --cached --quiet || git commit -m "Update local newsletter page"
            git push
          fi
