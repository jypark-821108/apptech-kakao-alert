name: Backfill Local News 2026-05-05

on:
  push:
    paths:
      - '.github/workflows/backfill-local-news-2026-05-05.yml'

permissions:
  contents: write

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - name: Build and send May 5 newsletter
        env:
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
          TARGET_DATE: '2026-05-05'
          NEWSLETTER_URL: https://jypark-821108.github.io/apptech-kakao-alert/news/2026-05-05.html
        run: python local_newsletter.py
      - name: Mark newsletter sent
        shell: bash
        run: |
          article_count=$(python - <<'PY'
          import json, pathlib
          path = pathlib.Path('docs/news-data/2026-05-05.json')
          try:
              data = json.loads(path.read_text(encoding='utf-8'))
              print(len(data.get('articles') or []))
          except Exception:
              print(0)
          PY
          )
          cat > local-news-status.json <<EOF
          {
            "date": "2026-05-05",
            "sent_at": "$(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M:%S %Z')",
            "article_count": $article_count
          }
          EOF
      - name: Commit newsletter page
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/newsletter.html docs/news docs/news-data local-news-status.json
          git diff --cached --quiet || git commit -m "Backfill local newsletter for 2026-05-05"
          git push
