name: Backfill Local News 2026-05-04

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/backfill-local-news-2026-05-04.yml'

permissions:
  contents: write

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - name: Build and send 2026-05-04 local newsletter
        env:
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
          NEWSLETTER_URL: https://jypark-821108.github.io/apptech-kakao-alert/newsletter.html
          TARGET_DATE: '2026-05-04'
        run: python local_newsletter.py
      - name: Mark newsletter sent
        run: |
          cat > local-news-status.json <<EOF
          {
            "date": "2026-05-04",
            "sent_at": "$(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M:%S %Z')",
            "backfill": true
          }
          EOF
      - name: Commit newsletter archive
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/newsletter.html docs/news docs/news-data local-news-status.json
          git diff --cached --quiet || git commit -m "Backfill local newsletter for 2026-05-04"
          git push
