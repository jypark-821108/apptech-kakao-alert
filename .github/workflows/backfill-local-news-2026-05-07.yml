name: Archive Local News 2026-05-07

on:
  push:
    paths:
      - '.github/workflows/backfill-local-news-2026-05-07.yml'

permissions:
  contents: write

jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - name: Build May 7 archive without sending Kakao
        env:
          TARGET_DATE: '2026-05-07'
          NEWSLETTER_URL: https://jypark-821108.github.io/apptech-kakao-alert/news/2026-05-07.html
        run: |
          python - <<'PY'
          from local_newsletter import collect_articles, write_page
          articles, excluded = collect_articles()
          write_page(articles, excluded)
          print(f'Archived articles={len(articles)} excluded={len(excluded)}')
          PY
      - name: Commit archive page
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/newsletter.html docs/news docs/news-data
          git diff --cached --quiet || git commit -m "Archive local newsletter for 2026-05-07"
          git push
